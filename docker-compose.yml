services:
  # ---- Django Application ----
  web:
    build: .
    container_name: interngrad-web
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - interngrad-network

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: interngrad-db
    environment:
      POSTGRES_DB: ${DB_NAME:-interngrad}
      POSTGRES_USER: ${DB_USER:-interngrad_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-interngrad_user} -d ${DB_NAME:-interngrad}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - interngrad-network

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: interngrad-nginx
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - interngrad-network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  interngrad-network:
    driver: bridge
